name: Publish MCP Registry entry

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@9997d9fe06095c0bd3244d84d5f0c0acb044e0e1 # v6.1.0
        with:
          node-version: 22
      - run: npm test
      - run: npm run verify:live
      - name: Install pinned registry publisher
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz \
            --output mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum --check
          tar xzf mcp-publisher.tar.gz mcp-publisher
          chmod 755 mcp-publisher
          ./mcp-publisher validate server.json
      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish registry entry
        run: ./mcp-publisher publish server.json
