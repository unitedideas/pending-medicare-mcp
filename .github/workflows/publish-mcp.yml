name: Publish MCP Registry entry

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22
      - run: npm test
      - run: npm run verify:live
      - name: Install pinned registry publisher
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz \
            --output mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum --check
          tar xzf mcp-publisher.tar.gz mcp-publisher
          chmod 755 mcp-publisher
          ./mcp-publisher validate server.json
      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish or verify registry entry
        shell: bash
        run: |
          name="$(jq -r .name server.json)"
          version="$(jq -r .version server.json)"
          if curl --fail --silent --show-error --get \
            --data-urlencode "search=$name" \
            --data-urlencode "version=$version" \
            https://registry.modelcontextprotocol.io/v0.1/servers \
            | jq -e --arg name "$name" --arg version "$version" \
              '.servers | map(.server // .) | any(.name == $name and .version == $version)' >/dev/null; then
            echo "Registry entry already published."
          else
            ./mcp-publisher publish server.json
          fi
      - name: Deprecate superseded registry identifier
        run: >-
          printf 'y\n' | ./mcp-publisher status --status deprecated --all-versions
          --message "Renamed for accurate registry discoverability; use io.github.unitedideas/pending-medicare-behavioral-health-provider-enrollment"
          io.github.unitedideas/pending-medicare-enrollment-data
