name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@9997d9fe06095c0bd3244d84d5f0c0acb044e0e1 # v6.1.0
        with:
          node-version: 22
      - run: npm test
      - run: npm run verify:live
